steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/oms-sheets-database/oms-sheets-job/oms-image:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/oms-sheets-database/oms-sheets-job/oms-image:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
